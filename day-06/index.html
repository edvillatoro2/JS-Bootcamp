<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Day 3 - Todo Deletion</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>Todo App</h1>
      <div class="todo-input">
        <input id="todo-input" type="text" placeholder="Enter a todo" />
        <div class="filters">
          <button id="show-all">All</button>
          <button id="show-active">Active</button>
          <button id="show-completed">Completed</button>
        </div>
        <button id="add-btn">Add Todo</button>
      </div>
      <ul id="todo-list"></ul>
    </div>
    <script src="script.js"></script>
  </body>
</html>
